spring:
  application:
    name: realty-management-application


database:
  default-hikari-properties:
    minimum-idle: 1
    maximum-pool-size: 2
    connection-timeout: 5000
    idle-timeout: 15000
    max-lifetime: 60000
    leak-detection-threshold: 2000
  postgres:
    realty:
      schema: auth
      package-names:
        datasource: realtyDatasource
        namedParameterJdbcTemplate: realtyNamedParameterJdbcTemplate
        containerEntityManagerFactory: realtyContainerEntityManagerFactory
        platformTransactionManager: realtyPlatformTransactionManager
        entity: com.karur.realty_management_application.entity
        repository: com.karur.realty_management_application.repository
      jdbc-url: jdbc:postgresql://localhost:5432/asset
      username: postgres
      password: postgres
      driver-class-name: org.postgresql.Driver
      hikari:
        schema: auth
        connection-test-query: SELECT 1
      jpa:
        properties:
          hibernate:
            dialect: org.hibernate.dialect.PostgreSQLDialect
    realtyAccess:
      schema: auth
      package-names:
        datasource: realtyAccessDatasource
        namedParameterJdbcTemplate: realtyAccessNamedParameterJdbcTemplate
        containerEntityManagerFactory: realtyAccessContainerEntityManagerFactory
        platformTransactionManager: realtyAccessPlatformTransactionManager
        entity: com.karur.realty_management_application.entity
        repository: com.karur.realty_management_application.repository
      jdbc-url: jdbc:postgresql://localhost:5432/access
      username: postgres
      password: postgres
      driver-class-name: org.postgresql.Driver
      hikari:
        schema: auth
        connection-test-query: SELECT 1
      jpa:
        properties:
          hibernate:
            dialect: org.hibernate.dialect.PostgreSQLDialect